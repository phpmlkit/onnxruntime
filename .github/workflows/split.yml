name: Split Packages

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

jobs:
  split:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - onnxruntime-cpu
          - onnxruntime-gpu
          - onnxruntime-directml

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare package files
        run: |
          chmod +x scripts/prepare-packages.sh
          ./scripts/prepare-packages.sh

      - name: Split ${{ matrix.package }}
        uses: claudiodekker/splitsh-action@v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.SPLIT_TOKEN }}
        with:
          prefix: "packages/${{ matrix.package }}"
          remote: "https://github.com/phpmlkit/${{ matrix.package }}.git"
          reference: "${{ github.ref_name }}"
          as_tag: "${{ startsWith(github.ref, 'refs/tags/') }}"
